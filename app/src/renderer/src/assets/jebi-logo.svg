<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="118" ry="118" fill="#1e1e2e" opacity="0.75"/>

  <!-- Top face — brand blue, lit from above -->
  <polygon points="78,159 181,96 434,96 331,159" fill="#3b82f6"/>

  <!-- Right face — deeper blue, shadowed -->
  <polygon points="331,159 434,96 434,354 331,417" fill="#1d4ed8"/>

  <!-- Front face — dark terminal screen -->
  <polygon points="78,159 331,159 331,417 78,417" fill="#060a12"/>

  <!-- Terminal prompt: > -->
  <polyline
    points="126,247 172,288 126,330"
    fill="none"
    stroke="#93c5fd"
    stroke-width="23"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Cursor: _ -->
  <rect x="186" y="310" width="83" height="16" rx="4" fill="white" opacity="0.85"/>
</svg>
