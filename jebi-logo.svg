<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="chevronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#0e0e11"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGlow)"/>

  <!-- Subtle inner border -->
  <rect width="512" height="512" rx="108" fill="none"
        stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Glow bloom behind chevron -->
  <path d="M 148 152 L 328 256 L 148 360"
        stroke="#7c3aed" stroke-width="60"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.25" filter="url(#softGlow)"/>

  <!-- Chevron › -->
  <path d="M 148 152 L 328 256 L 148 360"
        stroke="url(#chevronGrad)" stroke-width="46"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>

  <!-- Cursor block (blinking prompt cursor) -->
  <rect x="348" y="228" width="34" height="56" rx="5"
        fill="url(#chevronGrad)" opacity="0.92" filter="url(#glow)"/>
</svg>
