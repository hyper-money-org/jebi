name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0 — no v prefix)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version in package.json
        run: |
          cd app
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ github.event.inputs.version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add app/package.json
          git diff --staged --quiet || git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main
          git push origin "v${{ github.event.inputs.version }}"

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Build arm64
        run: |
          curl -fL https://github.com/jebi-sh/llama-deps/releases/latest/download/llama-deps-arm64.tar.gz -o /tmp/deps.tar.gz
          tar -xzf /tmp/deps.tar.gz -C core/bin
          cd core && GOARCH=arm64 go build -o term-core .
          cd ../app && npm run build && npx electron-builder --mac dmg:arm64 zip:arm64 --publish never

      - name: Build x64
        run: |
          rm -f core/bin/*.dylib core/bin/llama-server
          curl -fL https://github.com/jebi-sh/llama-deps/releases/latest/download/llama-deps-x86_64.tar.gz -o /tmp/deps.tar.gz
          tar -xzf /tmp/deps.tar.gz -C core/bin
          cd core && GOARCH=amd64 go build -o term-core .
          cd ../app && npx electron-builder --mac dmg:x64 zip:x64 --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: jebi v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            app/dist/jebi-*-arm64.dmg
            app/dist/jebi-*-arm64-mac.zip
            app/dist/jebi-*-x64.dmg
            app/dist/jebi-*-x64-mac.zip
          body: |
            ## jebi v${{ github.event.inputs.version }}

            ### Install via Homebrew
            ```bash
            brew tap jebi-sh/tap
            brew install --cask jebi
            ```

            ### Manual install
            - **Apple Silicon:** download `jebi-*-arm64.dmg`
            - **Intel:** download `jebi-*-x64.dmg`

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          ARM_DMG=$(ls app/dist/jebi-*-arm64.dmg)
          X64_DMG=$(ls app/dist/jebi-*-x64.dmg)
          ARM_SHA=$(shasum -a 256 "$ARM_DMG" | awk '{print $1}')
          X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/jebi-sh/homebrew-tap.git /tmp/tap
          cd /tmp/tap
          mkdir -p Casks

          cat > Casks/jebi.rb << EOF
          cask "jebi" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/jebi-sh/jebi/releases/download/v${VERSION}/jebi-${VERSION}-arm64.dmg"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "https://github.com/jebi-sh/jebi/releases/download/v${VERSION}/jebi-${VERSION}-x64.dmg"
              sha256 "${X64_SHA}"
            end

            name "jebi"
            desc "The AI-native terminal for Mac"
            homepage "https://jebi.sh"

            depends_on macos: ">= :monterey"

            app "jebi.app"
            binary "#{appdir}/jebi.app/Contents/MacOS/jebi"

            zap trash: [
              "~/Library/Application Support/jebi",
              "~/Library/Preferences/com.jawahar.jebi.plist",
            ]
          end
          EOF

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Casks/jebi.rb
          git commit -m "jebi: update to ${VERSION}"
          git push
